name: Validar mensajes de commits
on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar dependencias de commitlint
        run: |
          mkdir /tmp/commitlint
          cd /tmp/commitlint
          npm init -y
          npm install --save-dev @commitlint/cli@18 @commitlint/config-conventional@18

      - name: Crear archivo de configuración temporal
        run: |
          cat > /tmp/commitlint/commitlint.config.cjs << 'EOF'
          module.exports = {
            extends: ['@commitlint/config-conventional'],
            rules: {
              'header-max-length': [2, 'always', 150],
              'body-max-line-length': [2, 'always', 250]
            }
          };
          EOF

      - name: Validar commits del Pull Request
        run: |
          set -e
          COMMITLINT=/tmp/commitlint/node_modules/.bin/commitlint
          CONFIG=/tmp/commitlint/commitlint.config.cjs

          commits=$(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})

          if [ -z "$commits" ]; then
            echo "⚠️ No se encontraron commits para validar."
            exit 0
          fi

          errores=0
          for commit in $commits; do
            echo "⧗ Validando commit: $commit"
            mensaje=$(git show -s --format=%B $commit)
            echo "📝 Mensaje del commit: \"$mensaje\""
            if echo "$mensaje" | "$COMMITLINT" --config "$CONFIG"; then
              echo "✅ Commit válido"
            else
              echo "❌ Commit inválido: $commit"
              errores=1
            fi
          done

          if [ $errores -ne 0 ]; then
            echo "🚨 Se encontraron commits no válidos. Fallando el workflow."
            exit 1
          else
            echo "🎉 Todos los commits cumplen con la convención."
          fi
