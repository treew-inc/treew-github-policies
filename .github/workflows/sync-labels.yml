name: Sync labels (test)

on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/labels.yml"

# (Opcional) Permisos mínimos para este workflow.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels to selected repositories (no prune)
        uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
          repository: |
            treew-inc/logistica-app-cd
            treew-inc/logistica-api-fleetcontrol
            treew-inc/logistica-app-distributorflutter
            treew-inc/logistica-svc-packlinkfrontend
            treew-inc/logistica-svc-packlinkbackend
            treew-inc/logistica-mcp-fleetcontrol
            treew-inc/logistica-svc-microcdbackend
            treew-inc/logistica-svc-microcdfrontend
            treew-inc/logistica-web-distributors
            treew-inc/logistica-web-fleetcontrol
            treew-inc/logistica-web-fleetcontroladmin
            treew-inc/logistica-app-distributioncenter
          prune: false                 # No elimina etiquetas que no estén en labels.yml
          token: ${{ secrets.PERSONAL_TOKEN }}  # PAT con Write en Issues/metadata
        continue-on-error: true         # Si un repo falla, sigue con los demás
