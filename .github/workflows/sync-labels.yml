name: Sync labels (test)

on:
  workflow_dispatch: {}
  push:
    paths:
      - ".github/labels.yml"

# (Opcional) Permisos mínimos para este workflow.
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels to selected repositories (no prune)
        uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
          repository: |
            treew-inc/ia-api-imageaiproductprofile
            treew-inc/ia-api-chatgptprompt
            treew-inc/ia-mcp-client
            treew-inc/ia-mcp-freshservice
            treew-inc/ia-mcp-github
            treew-inc/ia-mcp-gitlab
            treew-inc/ia-api-storeagentai
            treew-inc/ia-mcp-trello
          prune: true                 # No elimina etiquetas que no estén en labels.yml
          token: ${{ secrets.PERSONAL_TOKEN }}  # PAT con Write en Issues/metadata
        continue-on-error: true         # Si un repo falla, sigue con los demás
